{{ block title }}
Test Round
{{ endblock }}

{{ block content }}
    <i>Geben Sie einen Wert </i>
    <br>
    <br>
    <strong>{{ testing }}</strong>
    <br>
    <br>
<!-- Slider label bar -->
<div style="width:500px; display:flex; justify-content:space-between; font-size:12px;">
    <span>0</span>
    <span>100</span>
</div>
<!-- Table just for layout (optional) -->
    <table style="width:auto">
        <tr>
            <td>
                <input type="range" name="test" value="0" step="1"
                       style="width:500px; appearance: none; height: 6px; background: #ddd; border-radius: 4px;"
                       min="0" max="100"
                       oninput="document.getElementById('pers_slider').innerText = this.value;">
                <p>Ihr Wert: <span id="pers_slider">0</span>%</p>
            </td>
        </tr>
    </table>
    <br>

    <button style="background-color: #4CAF50; color: white;" type="submit">OK</button>
    {{ include_sibling 'Timer1.html' }}
{{ endblock }}
